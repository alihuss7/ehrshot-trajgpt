model_name: trajgpt

# TrajGPT architecture (official repo defaults)
num_layers: 8
num_heads: 4
d_model: 200
qk_dim: 200
v_dim: 400
ff_dim: 800
tau: 20
dropout: 0.0
max_seq_len: 256
forecast_method: time_specific

# Data
meds_data_dir: data/EHRSHOT_MEDS/data
assets_dir: data/EHRSHOT_ASSETS

# Pretraining
pretrain_epochs: 20
pretrain_lr: 3.0e-05
pretrain_batch_size: 32
weight_decay: 0.01
warmup_steps: 500
forward_impl: parallel
device: auto

# Tokenization (code-only)
tokenizer_min_count: 1

# Outputs
checkpoint_dir: results/gen2/trajgpt/checkpoints
embedding_output_dir: results/gen2/trajgpt/embeddings
embedding_batch_size: 64
results_dir: results/gen2/trajgpt
